# Based on the PolyU official brand assets page and brand guideline wording:
# - PolyU Red is the primary brand color for the logo.
# - PolyU Grey is the supporting color for the logotype.
# The public page names the official colors but does not expose web hex codes,
# so the hex values below are conservative screen approximations that can be
# replaced later if PolyU provides official digital specifications.

meta:
  name:
    short: PolyU
    full: The Hong Kong Polytechnic University
  links:
    home: https://www.polyu.edu.hk/
    brand: https://www.polyu.edu.hk/cpa/brand-assets/

logo:
  images:
    icon: logo.png
    icon-transparent: logo-trans.png
    wide: logo-name.png
  small: icon
  medium: wide
  large: wide

color:
  palette:
    polyu-red: "#A02337"
    polyu-grey: "#58595B"
    black: "#231F20"
    white: "#FFFFFF"
    neutral-light: "#F5F5F5"

  foreground: black
  background: white
  primary: polyu-red
  secondary: polyu-grey
  tertiary: neutral-light
  success: polyu-grey
  info: polyu-grey
  warning: polyu-red
  danger: polyu-red
  light: white
  dark: black

typography:
  base:
    family: TeX Gyre Pagella
    line-height: 1.2
  headings:
    family: Computer Modern Sans Serif
    color: polyu-red
    weight: bold
  link:
    color: polyu-red
    decoration: underline
  monospace:
    family: Courier New

defaults:
  bootstrap:
    rules: |
      body {
        --polyu-header-height: 92px;
        --polyu-header-gap: 1.5rem;
        --polyu-header-side-padding: clamp(1rem, 3vw, 2.5rem);
        --polyu-header-offset: calc(var(--polyu-header-height) + var(--polyu-header-gap));
        --polyu-header-border: rgba(88, 89, 91, 0.16);
        --polyu-header-bg: rgba(255, 255, 255, 0.96);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 1030;
        height: var(--polyu-header-height);
        border-bottom: 1px solid var(--polyu-header-border);
        background-color: var(--polyu-header-bg);
        background-image: url("_extensions/polyu/logo-name.png"), url("_extensions/polyu/tagline.png");
        background-repeat: no-repeat, no-repeat;
        background-position: left var(--polyu-header-side-padding) center, right var(--polyu-header-side-padding) center;
        background-size: clamp(180px, 30vw, 320px) auto, clamp(170px, 24vw, 280px) auto;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        pointer-events: none;
      }

      body #quarto-content {
        padding-top: var(--polyu-header-offset);
      }

      body #quarto-margin-sidebar,
      body #TOC {
        top: var(--polyu-header-offset);
      }

      body .sidebar.margin-sidebar {
        padding-top: 0.5rem;
      }

      body #quarto-content,
      body #quarto-document-content,
      body #title-block-header,
      body .anchored {
        scroll-margin-top: calc(var(--polyu-header-offset) + 0.5rem);
      }

      @media (max-width: 991.98px) {
        body {
          --polyu-header-height: 80px;
          --polyu-header-gap: 1rem;
        }

        body::before {
          background-position: left 1rem center, right 1rem center;
          background-size: min(52vw, 240px) auto, min(34vw, 170px) auto;
        }
      }

      @media (max-width: 575.98px) {
        body {
          --polyu-header-height: 72px;
        }

        body::before {
          background-size: min(58vw, 210px) auto, min(32vw, 120px) auto;
        }
      }

  quarto:
    format:
      revealjs:
        logo: _extensions/polyu/logo-name.png
        css: _extensions/polyu/revealjs-logo.css
        title-slide-attributes:
          data-background-image: _extensions/polyu/background.png
          data-background-opacity: "0.45"
          data-background-size: cover
          data-background-position: center
