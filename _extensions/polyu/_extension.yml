title: PolyU
author: Frank
version: 1.0.0
quarto-required: ">=1.9.0"
contributes:
  metadata:
    project:
      brand: brand.yml
  formats:
    html:
      base-format: html
      body-classes: polyu-html
      css: polyu-html.css
    revealjs:
      logo: assets/logo-name.png
      css: revealjs-logo.css
      title-slide-attributes:
        data-background-image: assets/background.png
        data-background-opacity: "0.45"
        data-background-size: cover
        data-background-position: center
